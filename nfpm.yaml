# nfpm configuration for s3slower packaging
# Documentation: https://nfpm.goreleaser.com/configuration/

name: s3slower
arch: amd64
platform: linux
version: ${VERSION}
release: ${RELEASE}
section: utils
priority: optional
maintainer: S3Slower Team <s3slower@example.com>
description: |
  S3Slower - eBPF-based S3 client latency tracer

  S3Slower is a production-ready monitoring tool that traces S3 client-side
  latency without requiring SDK instrumentation. It monitors HTTP/S3 traffic
  from any S3 client application and exports metrics via Prometheus.

vendor: S3Slower
homepage: https://github.com/s3slower/s3slower
license: Apache-2.0

# Common install/remove scripts (used by both RPM and DEB)
scripts:
  preinstall: packaging/preinstall.sh
  postinstall: packaging/postinstall.sh
  preremove: packaging/preremove.sh
  postremove: packaging/postremove.sh

# Contents to package
contents:
  # Main binary
  - src: build/s3slower
    dst: /usr/bin/s3slower
    file_info:
      mode: 0755
      owner: root
      group: root

  # Systemd service file
  - src: systemd/s3slower.service
    dst: /usr/lib/systemd/system/s3slower.service
    type: config|noreplace
    file_info:
      mode: 0644
      owner: root
      group: root

  # Default configuration
  - src: s3slower.yaml
    dst: /etc/s3slower/s3slower.yaml
    type: config|noreplace
    file_info:
      mode: 0644
      owner: root
      group: root

  # Create config directory
  - dst: /etc/s3slower
    type: dir
    file_info:
      mode: 0755
      owner: root
      group: root

  # Create log directory
  - dst: /var/log/s3slower
    type: dir
    file_info:
      mode: 0755
      owner: root
      group: root

# RPM-specific configuration
rpm:
  group: Applications/System
  compression: gzip

# DEB-specific configuration
deb:
  compression: gzip
